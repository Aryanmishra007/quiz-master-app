<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Master App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <main class="container card">
        <h1>Quiz Master Application</h1>
        <p class="subtitle">Test your knowledge with mixed-difficulty MCQs.</p>
        <ul class="instructions">
            <li>Each question has one correct answer.</li>
            <li>Progress is tracked as you continue.</li>
            <li>You can review all answers at the end.</li>
        </ul>
        <form action="{{ url_for('start_quiz') }}" method="post">
            <button type="submit" class="btn">Start Quiz</button>
        </form>
    </main>
</body>
</html>
